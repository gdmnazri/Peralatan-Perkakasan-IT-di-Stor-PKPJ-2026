<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventori PKPJ</title>

<style>

body{
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
  font-size:16px;
}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.logo{
  width:70px;
}

h2{
  font-size:28px;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:20px 0;
}

.card{
  padding:15px;
  color:white;
  border-radius:10px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.blue{background:#0d6efd}
.green{background:#198754}
.red{background:#dc3545}
.orange{background:#fd7e14}

/* FORM */
.form{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:10px;
  max-width:900px;
  margin:auto;
}

input,select,textarea{
  padding:10px;
  font-size:15px;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  color:white;
  cursor:pointer;
  font-size:15px;
  border-radius:6px;
}

.save{background:#0d6efd}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  font-size:15px;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}

th{
  background:#0d6efd;
  color:white;
}

/* DELETE */
.del{
  background:red;
  padding:5px 10px;
}

.edit{
  background:orange;
  padding:5px 10px;
}

</style>

</head>

<body>

<div class="header">
<img src="pkpj.png" class="logo">
<h2>Sistem Inventori PKPJ</h2>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

<div class="card blue">Total<br><span id="total">0</span></div>
<div class="card green">Baik<br><span id="baik">0</span></div>
<div class="card red">Rosak<br><span id="rosak">0</span></div>
<div class="card orange">Pelupusan<br><span id="pelupusan">0</span></div>

</div>

<!-- FORM -->
<div class="form">

<label>Tahun</label>
<select id="tahun"></select>

<label>No Inventori</label>
<input id="noInventori">

<label>Nama</label>
<input id="nama">

<label>Kategori</label>
<select id="kategori">
<option>ICT</option>
<option>Sewaan</option>
<option>PKPJ</option>
</select>

<label>Jenama</label>
<input id="jenama">

<label>Model</label>
<input id="model">

<label>Status</label>
<select id="status">
<option>Baik</option>
<option>Rosak</option>
<option>Pelupusan</option>
</select>

<label>Gambar</label>
<input id="gambar">

<label>Catatan</label>
<textarea id="catatan"></textarea>

</div>

<button class="save" onclick="simpan()">SIMPAN</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Kategori</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const API = "PASTE_URL";

let editRow = null;

// YEAR AUTO
for(let y=2010;y<=2035;y++){
  tahun.innerHTML += `<option>${y}</option>`;
}

// LOAD
function load(){

fetch(API)
.then(r=>r.json())
.then(d=>{

table.innerHTML="";

d.forEach(v=>{

table.innerHTML += `
<tr>
<td>${v[2]}</td>
<td>${v[3]}</td>
<td>${v[4]}</td>
<td>${v[11]}</td>
<td>
<button class="edit" onclick="edit(${v[v.length-1]})">Edit</button>
<button class="del" onclick="del(${v[v.length-1]})">Delete</button>
</td>
</tr>
`;

});

});

}

// STATS
function stats(){

fetch(API+"?action=stats")
.then(r=>r.json())
.then(s=>{

total.innerText=s.total;
baik.innerText=s.baik;
rosak.innerText=s.rosak;
pelupusan.innerText=s.pelupusan;

});

}

// SAVE
function simpan(){

let data={
action:"simpan",
tahun:tahun.value,
noInventori:noInventori.value,
nama:nama.value,
kategori:kategori.value,
jenama:jenama.value,
model:model.value,
status:status.value,
gambar:gambar.value,
catatan:catatan.value
};

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(()=>{

alert("BERJAYA DISIMPAN");
clear();
load();
stats();

});

}

// DELETE
function del(id){

if(!confirm("Delete data?")) return;

fetch(API,{
method:"POST",
body:JSON.stringify({action:"delete",rowNumber:id})
})
.then(()=>{load();stats();});

}

// CLEAR
function clear(){
document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

// INIT
window.onload=function(){
load();
stats();
}

</script>

</body>
</html>
