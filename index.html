<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PKPJ Inventori</title>

<style>

body{font-family:Arial;background:#f4f6f8;padding:20px}

.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo{width:60px}

.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:20px 0;
}

.card{
  padding:10px;
  color:white;
  border-radius:6px;
  text-align:center;
}

.blue{background:#0d6efd}
.green{background:#198754}
.red{background:#dc3545}
.orange{background:#fd7e14}

.form{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:10px;
  max-width:900px;
  margin:auto;
}

input,select,textarea{
  padding:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  color:white;
  cursor:pointer;
}

.save{background:#0d6efd}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  border:1px solid #ccc;
  padding:8px;
}

th{background:#0d6efd;color:white}

</style>

</head>

<body>

<div class="header">
  <img src="pkpj.png" class="logo">
  <h2>Sistem Inventori PKPJ</h2>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

  <div class="card blue">Total <br><span id="total"></span></div>
  <div class="card green">Baik <br><span id="baik"></span></div>
  <div class="card red">Rosak <br><span id="rosak"></span></div>
  <div class="card orange">Pelupusan <br><span id="pelupusan"></span></div>

</div>

<!-- FORM -->
<div class="form">

<label>Tahun</label>
<select id="tahun"></select>

<label>No Inventori</label>
<input id="noInventori">

<label>Nama</label>
<input id="nama">

<label>Kategori</label>
<select id="kategori">
  <option>ICT</option>
  <option>Sewaan</option>
  <option>PKPJ</option>
</select>

<label>Jenama</label>
<input id="jenama">

<label>Model</label>
<input id="model">

<label>Status</label>
<select id="status">
  <option>Baik</option>
  <option>Rosak</option>
  <option>Pelupusan</option>
</select>

<label>Gambar URL</label>
<input id="gambar">

<label>Catatan</label>
<textarea id="catatan"></textarea>

</div>

<button class="save" onclick="simpan()">SIMPAN</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Kategori</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const API="https://script.google.com/macros/s/AKfycbwVrSxZMipC72LokF6ojNd08bTlX5zTHxnjKUKNChZBE8nC5FaQooJR6D9DtgZCSiP2/exec";

let cache=[];

// TAHUN AUTO
let t=document.getElementById("tahun");
for(let y=2010;y<=2035;y++){
  t.innerHTML+=`<option>${y}</option>`;
}

// LOAD DATA
function load(){

fetch(API)
.then(r=>r.json())
.then(d=>{

cache=d;

table.innerHTML="";

d.forEach(v=>{

table.innerHTML+=`
<tr>
<td>${v[2]}</td>
<td>${v[3]}</td>
<td>${v[4]}</td>
<td>${v[11]}</td>
<td>
<button onclick="del(${v[16]})">Delete</button>
</td>
</tr>`;

});

});

}

// STATS
function stats(){

fetch(API+"?action=stats")
.then(r=>r.json())
.then(s=>{

total.innerText=s.total;
baik.innerText=s.baik;
rosak.innerText=s.rosak;
pelupusan.innerText=s.pelupusan;

});

}

// SIMPAN
function simpan(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"simpan",
tahun:tahun.value,
noInventori:noInventori.value,
nama:nama.value,
kategori:kategori.value,
jenama:jenama.value,
model:model.value,
status:status.value,
gambar:gambar.value,
catatan:catatan.value
})
})
.then(r=>r.json())
.then(()=>{

alert("BERJAYA DISIMPAN");

clear();
load();
stats();

});

}

// CLEAR
function clear(){
document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

// DELETE
function del(id){
fetch(API,{
method:"POST",
body:JSON.stringify({action:"delete",rowNumber:id})
})
.then(()=>{load();stats();});
}

window.onload=function(){
load();
stats();
}

</script>

</body>
</html>
