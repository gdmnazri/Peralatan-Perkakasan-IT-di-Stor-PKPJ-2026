<!DOCTYPE html>
<html>
<head>
<title>Inventory PKPJ</title>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}

.header{display:flex;align-items:center;justify-content:center;gap:10px}
.logo{width:60px;height:60px}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

input,select,textarea{padding:8px}

table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:8px}

button{padding:8px 10px;margin:3px}
</style>

</head>

<body>

<div class="header">
  <img src="pkpj.png" class="logo">
  <h2>Sistem Inventory PKPJ</h2>
</div>

<div class="grid">

<input id="tahun">
<input id="noInventori">
<input id="nama">

<select id="kategori">
  <option>ICT</option>
  <option>Sewaan</option>
  <option>PKPJ</option>
  <option>Lain-lain</option>
</select>

<input id="jenama">
<input id="model">

<input id="noSiri">
<input id="tagAset">

<input id="kuantiti">
<input id="lokasi">

<select id="status">
  <option>Baik</option>
  <option>Rosak</option>
</select>

<input id="tarikhTerima">
<input id="pembekal">

<input id="gambar">
<input type="file" id="imageInput">

<textarea id="catatan"></textarea>

</div>

<button onclick="simpan()">Simpan</button>

<h3>Dashboard</h3>
Total: <span id="total"></span>
Baik: <span id="baik"></span>
Rosak: <span id="rosak"></span>

<table>
<thead>
<tr>
<th>No</th><th>Nama</th><th>Kategori</th><th>Status</th><th>Action</th>
</tr>
</thead>

<tbody id="dataTable"></tbody>
</table>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyFwfcC-rVOOc67UPIIjwjAQssTTuC4lFz6L1-FkFqCMwlHWTiFDOxfBArFqRwDr82j/exec";

let cache=[];

function load(){
fetch(API_URL)
.then(r=>r.json())
.then(d=>{
cache=d;
let t=document.getElementById("dataTable");
t.innerHTML="";
d.forEach((v,i)=>{
t.innerHTML+=`
<tr>
<td>${v[2]}</td>
<td>${v[3]}</td>
<td>${v[4]}</td>
<td>${v[11]}</td>
<td>
<button onclick="del(${v[16]})">Delete</button>
</td>
</tr>`;
});
});
}

function stats(){
fetch(API_URL+"?action=stats")
.then(r=>r.json())
.then(s=>{
total.innerText=s.total;
baik.innerText=s.baik;
rosak.innerText=s.rosak;
});
}

function simpan(){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"simpan",
tahun:tahun.value,
noInventori:noInventori.value,
nama:nama.value,
kategori:kategori.value,
jenama:jenama.value,
model:model.value,
noSiri:noSiri.value,
tagAset:tagAset.value,
kuantiti:kuantiti.value,
lokasi:lokasi.value,
status:status.value,
tarikhTerima:tarikhTerima.value,
pembekal:pembekal.value,
gambar:gambar.value,
catatan:catatan.value
})
})
.then(r=>r.json())
.then(()=>{
alert("Berjaya disimpan");
load();
stats();
clear();
});

}

function clear(){
document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

function del(id){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"delete",rowNumber:id})
})
.then(()=>{load();stats();});
}

window.onload=function(){
load();
stats();
}

</script>

</body>
</html>
