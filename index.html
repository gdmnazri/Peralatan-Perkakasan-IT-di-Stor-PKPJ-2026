<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PKPJ INVENTORI PRO</title>

<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#f5f6fa);
  padding:20px;
}

h2{
  text-align:center;
  font-size:30px;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  margin:20px 0;
}

.card{
  padding:15px;
  border-radius:12px;
  color:white;
  text-align:center;
  font-weight:bold;
}

.blue{background:#0d6efd}
.green{background:#198754}
.red{background:#dc3545}
.orange{background:#fd7e14}
.purple{background:#6f42c1}
.gray{background:#343a40}

/* FORM */
.form{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:10px;
  max-width:950px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

input,select,textarea{
  padding:10px;
  font-size:15px;
}

/* BUTTON */
button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.save{background:#0d6efd}
.upload{background:#198754}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #eee;
  padding:10px;
  text-align:center;
}

th{
  background:#0d6efd;
  color:white;
}

.del{
  background:red;
  padding:5px 10px;
}

</style>

</head>

<body>

<h2>📦 SISTEM INVENTORI PKPJ</h2>

<!-- DASHBOARD -->
<div class="dashboard">

<div class="card blue">Total<br><span id="total">0</span></div>
<div class="card green">Baik<br><span id="baik">0</span></div>
<div class="card red">Rosak<br><span id="rosak">0</span></div>
<div class="card orange">Pelupusan<br><span id="pelupusan">0</span></div>
<div class="card purple">ICT<br><span id="ict">0</span></div>
<div class="card gray">Sewaan<br><span id="sewaan">0</span></div>

</div>

<!-- FORM -->
<div class="form">

<label>Tahun</label>
<select id="tahun"></select>

<label>No Inventori</label>
<input id="noInventori">

<label>Nama</label>
<input id="nama">

<label>Kategori</label>
<select id="kategori">
<option>ICT</option>
<option>Sewaan</option>
<option>PKPJ</option>
</select>

<label>Status</label>
<select id="status">
<option>Baik</option>
<option>Rosak</option>
<option>Pelupusan</option>
</select>

<label>Gambar</label>
<input id="gambar" readonly>

<label>Upload Gambar</label>
<input type="file" id="imageInput">

<button type="button" class="upload" onclick="uploadImage()">UPLOAD GAMBAR</button>

<label>Catatan</label>
<textarea id="catatan"></textarea>

</div>

<button class="save" onclick="simpan()">SIMPAN DATA</button>

<!-- TABLE -->
<table>

<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Kategori</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const API = "PASTE_URL_HERE";

/* YEAR */
for(let y=2010;y<=2035;y++){
  tahun.innerHTML += `<option>${y}</option>`;
}

/* LOAD */
function load(){

fetch(API)
.then(r=>r.json())
.then(d=>{

table.innerHTML="";

d.forEach(v=>{

table.innerHTML += `
<tr>
<td>${v.noInventori}</td>
<td>${v.nama}</td>
<td>${v.kategori}</td>
<td>${v.status}</td>

<td>
<button class="del" onclick="del(${v.row})">DELETE</button>
</td>

</tr>
`;

});

});

}

/* STATS */
function stats(){

fetch(API+"?action=stats")
.then(r=>r.json())
.then(s=>{

total.innerText=s.total;
baik.innerText=s.baik;
rosak.innerText=s.rosak;
pelupusan.innerText=s.pelupusan;
ict.innerText=s.ICT;
sewaan.innerText=s.Sewaan;

});

}

/* SIMPAN */
function simpan(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"simpan",
tahun:tahun.value,
noInventori:noInventori.value,
nama:nama.value,
kategori:kategori.value,
status:status.value,
gambar:gambar.value,
catatan:catatan.value
})
})
.then(r=>r.json())
.then(()=>{

alert("BERJAYA DISIMPAN ✔");
clear();
load();
stats();

});

}

/* UPLOAD */
function uploadImage(){

let file=document.getElementById("imageInput").files[0];

let reader=new FileReader();

reader.onload=function(e){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"upload",
image:e.target.result.split(",")[1],
mimeType:file.type,
fileName:file.name
})
})
.then(r=>r.json())
.then(res=>{

gambar.value=res.url;
alert("UPLOAD BERJAYA ✔");

});

};

reader.readAsDataURL(file);

}

/* DELETE */
function del(id){

if(!confirm("Delete data?")) return;

fetch(API,{
method:"POST",
body:JSON.stringify({action:"delete",row:id})
})
.then(()=>{load();stats();});

}

/* CLEAR */
function clear(){
document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

/* INIT */
window.onload=function(){
load();
stats();
}

</script>

</body>
</html>
