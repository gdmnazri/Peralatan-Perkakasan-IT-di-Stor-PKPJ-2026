<script>
const API = "https://script.google.com/macros/s/AKfycbxgGk8fXcN1qbvG-PTIHYB0UymbcxxFsZUyStbW98A6L-DbTUikDYwHXVNeG2oz7P_8/exec";

let allData = [];

const tahunEl = document.getElementById("tahun");
const noInventoriEl = document.getElementById("noInventori");
const namaEl = document.getElementById("nama");
const kategoriEl = document.getElementById("kategori");
const jenamaEl = document.getElementById("jenama");
const modelEl = document.getElementById("model");
const noSiriEl = document.getElementById("noSiri");
const tagAsetEl = document.getElementById("tagAset");
const kuantitiEl = document.getElementById("kuantiti");
const lokasiEl = document.getElementById("lokasi");
const lokasiLainEl = document.getElementById("lokasiLain");
const statusEl = document.getElementById("status");
const tarikhEl = document.getElementById("tarikh");
const pembekalEl = document.getElementById("pembekal");
const gambarEl = document.getElementById("gambar");
const catatanEl = document.getElementById("catatan");
const imageInputEl = document.getElementById("imageInput");
const tableEl = document.getElementById("table");
const editingRowEl = document.getElementById("editingRow");
const saveBtn = document.getElementById("saveBtn");
const saveText = document.getElementById("saveText");
const cancelBtn = document.getElementById("cancelBtn");

for(let y=2010; y<=2035; y++){
  tahunEl.innerHTML += `<option ${y === new Date().getFullYear() ? "selected" : ""}>${y}</option>`;
}

function showPage(pageId, btn){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-menu button").forEach(b => b.classList.remove("active"));

  document.getElementById(pageId).classList.add("active");
  btn.classList.add("active");
}

function goPage(pageId){
  const btnMap = {
    dashboardPage: document.getElementById("btnDashboard"),
    formPage: document.getElementById("btnForm"),
    tablePage: document.getElementById("btnTable")
  };

  showPage(pageId, btnMap[pageId]);
}

function checkLokasi(){
  if(lokasiEl.value === "Lain-lain"){
    lokasiLainEl.style.display = "block";
    lokasiLainEl.focus();
  }else{
    lokasiLainEl.style.display = "none";
    lokasiLainEl.value = "";
  }
}

function load(){
  fetch(API)
  .then(r => r.json())
  .then(d => {
    allData = d;
    renderTable(allData);
    document.getElementById("recordCount").innerText = allData.length;
    stats();
  });
}

function renderTable(data){
  tableEl.innerHTML = "";

  data.forEach((v,index) => {
    let badgeClass = "";

    if(v.status === "Baik") badgeClass = "badge-baik";
    if(v.status === "Rosak") badgeClass = "badge-rosak";
    if(v.status === "Pelupusan") badgeClass = "badge-pelupusan";

    let gambarButton = "-";

    if(v.gambar){
      gambarButton = `
        <a href="${v.gambar}" target="_blank" class="btn-image">
          <i class="fa-solid fa-link"></i> Link
        </a>`;
    }

    tableEl.innerHTML += `
    <tr>
      <td>${index + 1}</td>
      <td>${v.nama || ""}</td>
      <td>${v.kategori || ""}</td>
      <td>${v.jenama || ""}</td>
      <td>${v.model || ""}</td>
      <td>${v.noSiri || ""}</td>
      <td><span class="badge ${badgeClass}">${v.status || ""}</span></td>
      <td>${v.lokasi || ""}</td>
      <td>${v.catatan || ""}</td>
      <td>${gambarButton}</td>
      <td>
        <button class="btn-edit" onclick="editData(${v.row})">
          <i class="fa-solid fa-pen"></i>
        </button>

        <button class="btn-delete" onclick="del(${v.row})">
          <i class="fa-solid fa-trash"></i>
        </button>
      </td>
    </tr>`;
  });
}

function stats(){

  let total = allData.length;
  let baik = 0;
  let rosak = 0;
  let pelupusan = 0;
  let ict = 0;
  let sewaan = 0;
  let pkpj = 0;
  let prosesICT = 0;

  allData.forEach(v => {

    let status = String(v.status || "")
      .trim()
      .toLowerCase()
      .replace(/\s+/g," ");

    let kategori = String(v.kategori || "")
      .trim()
      .toLowerCase()
      .replace(/\s+/g," ");

    if(status === "baik") baik++;
    if(status === "rosak") rosak++;
    if(status === "pelupusan") pelupusan++;

    if(kategori === "ict"){
      ict++;
    }
    else if(kategori === "sewaan"){
      sewaan++;
    }
    else if(kategori === "pkpj"){
      pkpj++;
    }
    else if(
      kategori === "dalam proses pemulangan ke ict" ||
      kategori === "proses pemulangan ke ict" ||
      kategori.includes("proses") ||
      kategori.includes("pemulangan")
    ){
      prosesICT++;
    }

  });

  document.getElementById("total").innerText = total;
  document.getElementById("baik").innerText = baik;
  document.getElementById("rosak").innerText = rosak;
  document.getElementById("pelupusan").innerText = pelupusan;
  document.getElementById("ict").innerText = ict;
  document.getElementById("sewaan").innerText = sewaan;
  document.getElementById("pkpj").innerText = pkpj;
  document.getElementById("prosesICT").innerText = prosesICT;
}

function filterDashboard(type, value){
  let filtered = allData;

  if(type === "status"){
    filtered = allData.filter(v => String(v.status || "").trim() === value);
  }

  if(type === "kategori"){
    filtered = allData.filter(v => String(v.kategori || "").trim() === value);
  }

  if(type === "all"){
    filtered = allData;
  }

  renderTable(filtered);
  document.getElementById("recordCount").innerText = filtered.length;
  document.getElementById("searchInput").value = "";

  goPage("tablePage");
}

function editData(row){
  const data = allData.find(x => x.row == row);

  if(!data){
    alert("Data tidak dijumpai");
    return;
  }

  editingRowEl.value = data.row || "";

  tahunEl.value = data.tahun || new Date().getFullYear();
  noInventoriEl.value = data.noInventori || "";
  namaEl.value = data.nama || "";
  kategoriEl.value = data.kategori || "ICT";
  jenamaEl.value = data.jenama || "";
  modelEl.value = data.model || "";
  noSiriEl.value = data.noSiri || "";
  tagAsetEl.value = data.tagAset || "";
  kuantitiEl.value = data.kuantiti || "";
  statusEl.value = data.status || "Baik";
  tarikhEl.value = formatDateForInput(data.tarikh);
  pembekalEl.value = data.pembekal || "";
  gambarEl.value = data.gambar || "";
  catatanEl.value = data.catatan || "";

  if(data.lokasi === "Stor PKPJ" || data.lokasi === "Pejabat PKPJ" || data.lokasi === ""){
    lokasiEl.value = data.lokasi || "";
    lokasiLainEl.style.display = "none";
    lokasiLainEl.value = "";
  }else{
    lokasiEl.value = "Lain-lain";
    lokasiLainEl.style.display = "block";
    lokasiLainEl.value = data.lokasi || "";
  }

  saveBtn.classList.add("btn-update");
  saveText.innerText = "KEMASKINI DATA";
  cancelBtn.style.display = "inline-block";

  goPage("formPage");
}

function formatDateForInput(value){
  if(!value) return "";

  if(String(value).includes("T")){
    return String(value).split("T")[0];
  }

  const d = new Date(value);

  if(!isNaN(d)){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  return value;
}

function searchTable(){
  const keyword = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allData.filter(v =>
    String(v.nama || "").toLowerCase().includes(keyword) ||
    String(v.kategori || "").toLowerCase().includes(keyword) ||
    String(v.jenama || "").toLowerCase().includes(keyword) ||
    String(v.model || "").toLowerCase().includes(keyword) ||
    String(v.noSiri || "").toLowerCase().includes(keyword) ||
    String(v.status || "").toLowerCase().includes(keyword) ||
    String(v.lokasi || "").toLowerCase().includes(keyword) ||
    String(v.catatan || "").toLowerCase().includes(keyword) ||
    String(v.tagAset || "").toLowerCase().includes(keyword) ||
    String(v.pembekal || "").toLowerCase().includes(keyword)
  );

  renderTable(filtered);
  document.getElementById("recordCount").innerText = filtered.length;
}

function simpan(){
  let lokasiFinal = lokasiEl.value;

  if(lokasiEl.value === "Lain-lain"){
    if(lokasiLainEl.value.trim() === ""){
      alert("Sila masukkan lokasi lain-lain");
      lokasiLainEl.focus();
      return;
    }

    lokasiFinal = lokasiLainEl.value.trim();
  }

  const isEdit = editingRowEl.value !== "";

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:isEdit ? "update" : "simpan",
      row:editingRowEl.value,
      tahun:tahunEl.value,
      noInventori:noInventoriEl.value,
      nama:namaEl.value,
      kategori:kategoriEl.value,
      jenama:jenamaEl.value,
      model:modelEl.value,
      noSiri:noSiriEl.value,
      tagAset:tagAsetEl.value,
      kuantiti:kuantitiEl.value,
      lokasi:lokasiFinal,
      status:statusEl.value,
      tarikh:tarikhEl.value,
      pembekal:pembekalEl.value,
      gambar:gambarEl.value,
      catatan:catatanEl.value
    })
  })
  .then(r => r.json())
  .then(res => {
    alert(isEdit ? "BERJAYA DIKEMASKINI" : (res.message || "BERJAYA DISIMPAN"));
    clearForm();
    load();
    goPage("tablePage");
  });
}

function uploadImage(){
  const file = imageInputEl.files[0];

  if(!file){
    alert("Pilih gambar");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    fetch(API,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({
        action:"upload",
        image:e.target.result.split(",")[1],
        mimeType:file.type,
        fileName:file.name
      })
    })
    .then(r => r.json())
    .then(res => {
      gambarEl.value = res.url;
      alert("UPLOAD OK. Link gambar sudah masuk dalam kotak Gambar URL.");
    });
  };

  reader.readAsDataURL(file);
}

function del(id){
  if(!confirm("Delete data ini?")) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"delete",
      row:id
    })
  })
  .then(() => {
    load();
  });
}

function exportExcel(){
  let csv = "No,Nama,Kategori,Jenama,Model,No Siri,Status,Lokasi,Catatan\n";

  allData.forEach((v,index)=>{
    csv += [
      index + 1,
      v.nama || "",
      v.kategori || "",
      v.jenama || "",
      v.model || "",
      v.noSiri || "",
      v.status || "",
      v.lokasi || "",
      v.catatan || ""
    ].map(x => `"${String(x).replace(/"/g,'""')}"`).join(",") + "\n";
  });

  const blob = new Blob([csv], {
    type:"text/csv;charset=utf-8;"
  });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "Senarai_Inventori_PKPJ.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function cancelEdit(){
  clearForm();
}

function clearForm(){
  document.querySelectorAll("input, textarea").forEach(e => e.value = "");

  editingRowEl.value = "";
  tahunEl.value = new Date().getFullYear();
  kategoriEl.value = "ICT";
  statusEl.value = "Baik";

  lokasiEl.selectedIndex = 0;
  lokasiLainEl.style.display = "none";
  lokasiLainEl.value = "";

  saveBtn.classList.remove("btn-update");
  saveText.innerText = "SIMPAN DATA";
  cancelBtn.style.display = "none";
}

window.onload = function(){
  load();
};
</script>
