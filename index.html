<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8">
  <title>Sistem Inventori IT PKPJ</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }

    .logo {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .header h1 {
      font-size: 22px;
      margin: 0;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 1200px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    /* ===== FORM GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    input, select, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      grid-column: span 2;
    }

    /* ===== BUTTON ===== */
    .btn {
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .btn-save {
      background: #0d6efd;
    }

    .btn-upload {
      background: #198754;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    /* ===== TABLE ===== */
    table {
      width: 100%;
      margin-top: 25px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }

    th {
      background: #0d6efd;
      color: white;
    }

  </style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <img src="pkpj.png" class="logo">
  <h1>Sistem Inventori Peralatan IT PKPJ</h1>
</div>

<div class="container">

  <!-- ===== FORM ===== -->
  <div class="grid">

    <select id="tahun"></select>
    <input id="noInventori" placeholder="No Inventori">

    <input id="nama" placeholder="Nama Peralatan">
    <input id="kategori" placeholder="Kategori">

    <input id="jenama" placeholder="Jenama">
    <input id="model" placeholder="Model">

    <input id="noSiri" placeholder="No Siri">
    <input id="tagAset" placeholder="Tag Aset">

    <input id="kuantiti" placeholder="Kuantiti">
    <input id="lokasi" placeholder="Lokasi">

    <select id="status">
      <option value="">-- Pilih Status --</option>
      <option>Baik</option>
      <option>Rosak</option>
      <option>Baik Pulih</option>
    </select>

    <input type="date" id="tarikhTerima">

    <input id="pembekal" placeholder="Pembekal">

    <input id="gambar" placeholder="URL Gambar" readonly>
    <input type="file" id="imageInput">

    <textarea id="catatan" placeholder="Catatan"></textarea>

  </div>

  <!-- ===== BUTTON ===== -->
  <div class="btn-group">
    <button class="btn btn-save" onclick="simpan()">Simpan Data</button>
    <button class="btn btn-upload" onclick="uploadImage()">Upload Gambar</button>
  </div>

  <!-- ===== TABLE ===== -->
  <table>
    <thead>
      <tr>
        <th>No Inventori</th>
        <th>Nama</th>
        <th>Jenama</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="dataTable">
      <tr>
        <td colspan="4">Loading...</td>
      </tr>
    </tbody>
  </table>

</div>

<!-- ===== SCRIPT ===== -->
<script>

const API_URL = "PASTE WEB APP URL KAU";


/* ===== AUTO TAHUN ===== */
const tahunSelect = document.getElementById("tahun");
const currentYear = new Date().getFullYear();

tahunSelect.innerHTML = '<option value="">-- Pilih Tahun --</option>';

for (let y = 2010; y <= currentYear + 5; y++) {
  tahunSelect.innerHTML += `<option value="${y}">${y}</option>`;
}


/* ===== LOAD DATA ===== */
window.onload = loadData;

function loadData() {
  fetch(API_URL)
    .then(r => r.text())
    .then(t => {
      let data = JSON.parse(t);
      let table = document.getElementById("dataTable");
      table.innerHTML = "";

      if (!Array.isArray(data)) return;

      for (let i = 0; i < data.length; i++) {
        table.innerHTML += `
          <tr>
            <td>${data[i][2] || ""}</td>
            <td>${data[i][3] || ""}</td>
            <td>${data[i][5] || ""}</td>
            <td>${data[i][11] || ""}</td>
          </tr>
        `;
      }
    });
}


/* ===== SIMPAN ===== */
function simpan() {

  let data = {
    action: "simpan",
    tahun: tahunSelect.value,
    noInventori: noInventori.value,
    nama: nama.value,
    kategori: kategori.value,
    jenama: jenama.value,
    model: model.value,
    noSiri: noSiri.value,
    tagAset: tagAset.value,
    kuantiti: kuantiti.value,
    lokasi: lokasi.value,
    status: status.value,
    tarikhTerima: tarikhTerima.value,
    pembekal: pembekal.value,
    gambar: gambar.value,
    catatan: catatan.value
  };

  fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type":"text/plain"},
    body: JSON.stringify(data)
  })
  .then(r => r.json())
  .then(res => {
    alert(res.message);
    loadData();
  });
}


/* ===== UPLOAD IMAGE ===== */
function uploadImage() {

  let file = imageInput.files[0];
  let reader = new FileReader();

  reader.onload = function(e) {

    let base64 = e.target.result.split(",")[1];

    fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain"},
      body: JSON.stringify({
        action: "upload",
        image: base64,
        mimeType: file.type,
        fileName: file.name
      })
    })
    .then(r => r.json())
    .then(res => {
      gambar.value = res.url;
      alert("Upload OK");
    });

  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
