<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Inventori IT PKPJ</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f8fc;
  padding:18px 24px;
  color:#071b3a;
  font-size:14px;
}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
}

.header img{
  width:60px;
  height:auto;
}

.header h2{
  margin:0;
  font-size:30px;
  font-weight:900;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:16px;
  margin-bottom:24px;
}

.card{
  height:80px;
  border-radius:6px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  font-weight:bold;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.icon{font-size:34px}
.card span{display:block;font-size:28px;text-align:center}

.blue{background:#0d6efd}
.green{background:#198754}
.red{background:#dc3545}
.orange{background:#fd7e14}
.purple{background:#6f42c1}
.gray{background:#263342}
.yellow{background:#ffc107;color:white}

.form-box{
  background:white;
  border-radius:10px;
  padding:26px 52px 16px;
  box-shadow:0 2px 14px rgba(0,0,0,.12);
  margin-bottom:16px;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:16px 36px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

label{
  font-weight:700;
  font-size:14px;
}

input,select,textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid #cbd5e1;
  border-radius:4px;
  font-size:14px;
}

textarea{
  height:58px;
  resize:vertical;
}

.catatan-row{
  grid-column:1 / span 3;
  display:grid;
  grid-template-columns:240px 1fr;
  gap:36px;
}

button{
  border:none;
  color:white;
  cursor:pointer;
  border-radius:4px;
  font-size:14px;
  font-weight:bold;
  padding:9px 16px;
}

.upload-btn{background:#198754;width:160px;margin-top:6px}
.save{background:#0d6efd;min-width:150px}

.save-wrap{
  text-align:center;
  margin-top:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #dbe2ea;
  padding:9px;
  text-align:center;
}

th{
  background:#0069e6;
  color:white;
}

td:nth-child(1),td:nth-child(2){
  text-align:left;
}

.del{
  background:#dc3545;
  padding:5px 12px;
  font-size:12px;
}

@media(max-width:1100px){
  .dashboard{grid-template-columns:repeat(2,1fr)}
  .form{grid-template-columns:1fr}
  .catatan-row{grid-column:auto;grid-template-columns:1fr}
  .form-box{padding:20px}
}
</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/gdmnazri/Peralatan-Perkakasan-IT-di-Stor-PKPJ-2026/main/pkpj.png"
       alt="Logo PKPJ">
  <h2>SISTEM INVENTORI IT PKPJ</h2>
</div>

<div class="dashboard">
  <div class="card blue"><div class="icon">▢</div><div>Total <span id="total">0</span></div></div>
  <div class="card green"><div class="icon">✓</div><div>Baik <span id="baik">0</span></div></div>
  <div class="card red"><div class="icon">🛠</div><div>Rosak <span id="rosak">0</span></div></div>
  <div class="card orange"><div class="icon">▧</div><div>Pelupusan <span id="pelupusan">0</span></div></div>
  <div class="card purple"><div class="icon">▭</div><div>ICT <span id="ict">0</span></div></div>
  <div class="card gray"><div class="icon">▥</div><div>Sewaan <span id="sewaan">0</span></div></div>
  <div class="card yellow"><div class="icon">⬢</div><div>PKPJ <span id="pkpj">0</span></div></div>
</div>

<div class="form-box">
  <div class="form">

    <div class="field">
      <label>Tahun</label>
      <select id="tahun"></select>
    </div>

    <div class="field">
      <label>No Inventori</label>
      <input id="noInventori">
    </div>

    <div class="field">
      <label>Gambar URL</label>
      <input id="gambar" readonly>
    </div>

    <div class="field">
      <label>Nama</label>
      <input id="nama">
    </div>

    <div class="field">
      <label>Kategori</label>
      <select id="kategori">
        <option>ICT</option>
        <option>Sewaan</option>
        <option>PKPJ</option>
      </select>
    </div>

    <div class="field">
      <label>Upload Gambar</label>
      <input type="file" id="imageInput">
      <button type="button" class="upload-btn" onclick="uploadImage()">UPLOAD GAMBAR</button>
    </div>

    <div class="field">
      <label>Jenama</label>
      <input id="jenama">
    </div>

    <div class="field">
      <label>Model</label>
      <input id="model">
    </div>

    <div></div>

    <div class="field">
      <label>No Siri</label>
      <input id="noSiri">
    </div>

    <div class="field">
      <label>Tag Aset</label>
      <input id="tagAset">
    </div>

    <div></div>

    <div class="field">
      <label>Kuantiti</label>
      <input id="kuantiti" type="number" min="1">
    </div>

    <div class="field">
      <label>Status</label>
      <select id="status">
        <option>Baik</option>
        <option>Rosak</option>
        <option>Pelupusan</option>
      </select>
    </div>

    <div></div>

    <div class="field">
      <label>Lokasi</label>
      <select id="lokasi" onchange="checkLokasi()">
        <option value="">-- Pilih Lokasi --</option>
        <option value="Stor PKPJ">Stor PKPJ</option>
        <option value="Pejabat PKPJ">Pejabat PKPJ</option>
        <option value="Lain-lain">Lain-lain</option>
      </select>

      <input type="text"
             id="lokasiLain"
             placeholder="Masukkan lokasi..."
             style="display:none;margin-top:8px;">
    </div>

    <div class="field">
      <label>Pembekal</label>
      <input id="pembekal">
    </div>

    <div></div>

    <div class="catatan-row">
      <div class="field">
        <label>Tarikh</label>
        <input type="date" id="tarikh">
      </div>

      <div class="field">
        <label>Catatan</label>
        <textarea id="catatan"></textarea>
      </div>
    </div>

  </div>

  <div class="save-wrap">
    <button class="save" onclick="simpan()">💾 SIMPAN DATA</button>
  </div>
</div>

<table>
<thead>
<tr>
  <th>No Inventori</th>
  <th>Nama</th>
  <th>Kategori</th>
  <th>Jenama</th>
  <th>Lokasi</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbxgGk8fXcN1qbvG-PTIHYB0UymbcxxFsZUyStbW98A6L-DbTUikDYwHXVNeG2oz7P_8/exec";

/* Tahun */
for(let y=2010; y<=2035; y++){
  tahun.innerHTML += `<option ${y === new Date().getFullYear() ? "selected" : ""}>${y}</option>`;
}

/* Lokasi Lain-lain */
function checkLokasi(){
  const lokasi = document.getElementById("lokasi");
  const lokasiLain = document.getElementById("lokasiLain");

  if(lokasi.value === "Lain-lain"){
    lokasiLain.style.display = "block";
    lokasiLain.focus();
  }else{
    lokasiLain.style.display = "none";
    lokasiLain.value = "";
  }
}

/* Load Data */
function load(){
  fetch(API)
  .then(r => r.json())
  .then(d => {
    table.innerHTML = "";

    d.forEach(v => {
      table.innerHTML += `
      <tr>
        <td>${v.noInventori || ""}</td>
        <td>${v.nama || ""}</td>
        <td>${v.kategori || ""}</td>
        <td>${v.jenama || ""}</td>
        <td>${v.lokasi || ""}</td>
        <td><button class="del" onclick="del(${v.row})">Delete</button></td>
      </tr>`;
    });
  });
}

/* Dashboard Stats */
function stats(){
  fetch(API + "?action=stats")
  .then(r => r.json())
  .then(s => {
    total.innerText = s.total || 0;
    baik.innerText = s.baik || 0;
    rosak.innerText = s.rosak || 0;
    pelupusan.innerText = s.pelupusan || 0;
    ict.innerText = s.ICT || 0;
    sewaan.innerText = s.Sewaan || 0;
    pkpj.innerText = s.PKPJ || 0;
  });
}

/* Simpan Data */
function simpan(){

  let lokasiFinal = lokasi.value;

  if(lokasi.value === "Lain-lain"){
    if(lokasiLain.value.trim() === ""){
      alert("Sila masukkan lokasi lain-lain");
      lokasiLain.focus();
      return;
    }
    lokasiFinal = lokasiLain.value.trim();
  }

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"simpan",
      tahun:tahun.value,
      noInventori:noInventori.value,
      nama:nama.value,
      kategori:kategori.value,
      jenama:jenama.value,
      model:model.value,
      noSiri:noSiri.value,
      tagAset:tagAset.value,
      kuantiti:kuantiti.value,
      lokasi:lokasiFinal,
      status:status.value,
      tarikh:tarikh.value,
      pembekal:pembekal.value,
      gambar:gambar.value,
      catatan:catatan.value
    })
  })
  .then(r => r.json())
  .then(res => {
    alert(res.message || "OK");
    clearForm();
    load();
    stats();
  });
}

/* Upload Gambar */
function uploadImage(){
  let file = imageInput.files[0];

  if(!file){
    alert("Pilih gambar");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    fetch(API,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({
        action:"upload",
        image:e.target.result.split(",")[1],
        mimeType:file.type,
        fileName:file.name
      })
    })
    .then(r => r.json())
    .then(res => {
      gambar.value = res.url;
      alert("UPLOAD OK");
    });
  };

  reader.readAsDataURL(file);
}

/* Delete */
function del(id){
  if(!confirm("Delete data ini?")) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"delete",
      row:id
    })
  })
  .then(() => {
    load();
    stats();
  });
}

/* Clear Form */
function clearForm(){
  document.querySelectorAll("input, textarea").forEach(e => e.value = "");

  tahun.value = new Date().getFullYear();
  kategori.value = "ICT";
  status.value = "Baik";

  lokasi.selectedIndex = 0;
  lokasiLain.style.display = "none";
  lokasiLain.value = "";
}

/* Init */
window.onload = function(){
  load();
  stats();
};
</script>

</body>
</html>
