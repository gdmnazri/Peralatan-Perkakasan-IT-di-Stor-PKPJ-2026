<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Inventori IT PKPJ</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f8fc;
  padding:18px 24px;
  color:#071b3a;
  font-size:14px;
}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-bottom:20px;
}

.header img{
  width:60px;
  height:auto;
}

.header h2{
  margin:0;
  font-size:30px;
  font-weight:900;
}

.dashboard-section{
  display:grid;
  grid-template-columns:4fr 3fr;
  gap:16px;
  margin-bottom:24px;
}

.dash-group{
  background:white;
  border-radius:8px;
  padding:12px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.dash-title{
  text-align:center;
  font-size:13px;
  font-weight:900;
  letter-spacing:1px;
  margin-bottom:10px;
}

.dashboard{
  display:grid;
  gap:12px;
}

.status-dashboard{
  grid-template-columns:repeat(4,1fr);
}

.kategori-dashboard{
  grid-template-columns:repeat(3,1fr);
}

.card{
  height:82px;
  border-radius:8px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  font-weight:bold;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.card i{
  font-size:34px;
}

.dashboard-logo{
  width:40px;
  height:40px;
  object-fit:contain;
}

.card span{
  display:block;
  font-size:30px;
  text-align:center;
  line-height:1;
  margin-top:3px;
}

.blue{background:linear-gradient(135deg,#0069ff,#0d6efd)}
.green{background:linear-gradient(135deg,#0b7d3b,#198754)}
.red{background:linear-gradient(135deg,#d91f35,#dc3545)}
.orange{background:linear-gradient(135deg,#ff7300,#fd7e14)}
.purple{background:linear-gradient(135deg,#5426b5,#6f42c1)}
.gray{background:linear-gradient(135deg,#1d2939,#263342)}
.yellow{background:linear-gradient(135deg,#ffb300,#ffc107)}

.form-box{
  background:white;
  border-radius:10px;
  padding:26px 52px 16px;
  box-shadow:0 2px 14px rgba(0,0,0,.12);
  margin-bottom:16px;
}

.form{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:16px 36px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

label{
  font-weight:700;
  font-size:14px;
}

input,select,textarea{
  width:100%;
  padding:10px 12px;
  border:1px solid #cbd5e1;
  border-radius:4px;
  font-size:14px;
}

textarea{
  height:58px;
  resize:vertical;
}

.catatan-row{
  grid-column:1 / span 3;
  display:grid;
  grid-template-columns:240px 1fr;
  gap:36px;
}

button{
  border:none;
  color:white;
  cursor:pointer;
  border-radius:4px;
  font-size:14px;
  font-weight:bold;
  padding:9px 16px;
}

.upload-btn{
  background:#198754;
  width:160px;
  margin-top:6px;
}

.save{
  background:#0d6efd;
  min-width:150px;
}

.save-wrap{
  text-align:center;
  margin-top:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #dbe2ea;
  padding:9px;
  text-align:center;
}

th{
  background:#0069e6;
  color:white;
}

td:nth-child(1),
td:nth-child(2){
  text-align:left;
}

.del{
  background:#dc3545;
  padding:5px 12px;
  font-size:12px;
}

@media(max-width:1100px){
  .dashboard-section{
    grid-template-columns:1fr;
  }

  .status-dashboard,
  .kategori-dashboard{
    grid-template-columns:repeat(2,1fr);
  }

  .form{
    grid-template-columns:1fr;
  }

  .catatan-row{
    grid-column:auto;
    grid-template-columns:1fr;
  }

  .form-box{
    padding:20px;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/gdmnazri/Peralatan-Perkakasan-IT-di-Stor-PKPJ-2026/main/pkpj.png" alt="Logo PKPJ">
  <h2>SISTEM INVENTORI IT PKPJ</h2>
</div>

<div class="dashboard-section">

  <div class="dash-group">
    <div class="dash-title">JUMLAH MENGIKUT STATUS</div>

    <div class="dashboard status-dashboard">
      <div class="card blue">
        <i class="fa-solid fa-boxes-stacked"></i>
        <div>Total <span id="total">0</span></div>
      </div>

      <div class="card green">
        <i class="fa-solid fa-circle-check"></i>
        <div>Baik <span id="baik">0</span></div>
      </div>

      <div class="card red">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <div>Rosak <span id="rosak">0</span></div>
      </div>

      <div class="card orange">
        <i class="fa-solid fa-trash"></i>
        <div>Pelupusan <span id="pelupusan">0</span></div>
      </div>
    </div>
  </div>

  <div class="dash-group">
    <div class="dash-title">JUMLAH MENGIKUT KATEGORI</div>

    <div class="dashboard kategori-dashboard">
      <div class="card purple">
        <i class="fa-solid fa-computer"></i>
        <div>ICT <span id="ict">0</span></div>
      </div>

      <div class="card gray">
        <i class="fa-solid fa-building"></i>
        <div>Sewaan <span id="sewaan">0</span></div>
      </div>

      <div class="card yellow">
        <img class="dashboard-logo" src="https://raw.githubusercontent.com/gdmnazri/Peralatan-Perkakasan-IT-di-Stor-PKPJ-2026/main/pkpj.png" alt="PKPJ">
        <div>PKPJ <span id="pkpj">0</span></div>
      </div>
    </div>
  </div>

</div>

<div class="form-box">
  <div class="form">

    <div class="field">
      <label>Tahun</label>
      <select id="tahun"></select>
    </div>

    <div class="field">
      <label>No Inventori</label>
      <input id="noInventori">
    </div>

    <div class="field">
      <label>Gambar URL</label>
      <input id="gambar" readonly>
    </div>

    <div class="field">
      <label>Nama</label>
      <input id="nama">
    </div>

    <div class="field">
      <label>Kategori</label>
      <select id="kategori">
        <option>ICT</option>
        <option>Sewaan</option>
        <option>PKPJ</option>
      </select>
    </div>

    <div class="field">
      <label>Upload Gambar</label>
      <input type="file" id="imageInput">
      <button type="button" class="upload-btn" onclick="uploadImage()">UPLOAD GAMBAR</button>
    </div>

    <div class="field">
      <label>Jenama</label>
      <input id="jenama">
    </div>

    <div class="field">
      <label>Model</label>
      <input id="model">
    </div>

    <div></div>

    <div class="field">
      <label>No Siri</label>
      <input id="noSiri">
    </div>

    <div class="field">
      <label>Tag Aset</label>
      <input id="tagAset">
    </div>

    <div></div>

    <div class="field">
      <label>Kuantiti</label>
      <input id="kuantiti" type="number" min="1">
    </div>

    <div class="field">
      <label>Status</label>
      <select id="status">
        <option value="Baik">Baik</option>
        <option value="Rosak">Rosak</option>
        <option value="Pelupusan">Pelupusan</option>
      </select>
    </div>

    <div></div>

    <div class="field">
      <label>Lokasi</label>
      <select id="lokasi" onchange="checkLokasi()">
        <option value="">-- Pilih Lokasi --</option>
        <option value="Stor PKPJ">Stor PKPJ</option>
        <option value="Pejabat PKPJ">Pejabat PKPJ</option>
        <option value="Lain-lain">Lain-lain</option>
      </select>

      <input type="text"
             id="lokasiLain"
             placeholder="Masukkan lokasi..."
             style="display:none;margin-top:8px;">
    </div>

    <div class="field">
      <label>Pembekal</label>
      <input id="pembekal">
    </div>

    <div></div>

    <div class="catatan-row">
      <div class="field">
        <label>Tarikh</label>
        <input type="date" id="tarikh">
      </div>

      <div class="field">
        <label>Catatan</label>
        <textarea id="catatan"></textarea>
      </div>
    </div>

  </div>

  <div class="save-wrap">
    <button class="save" onclick="simpan()">
      <i class="fa-solid fa-floppy-disk"></i> SIMPAN DATA
    </button>
  </div>
</div>

<table>
<thead>
<tr>
  <th>No Inventori</th>
  <th>Nama</th>
  <th>Kategori</th>
  <th>Jenama</th>
  <th>Lokasi</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbxgGk8fXcN1qbvG-PTIHYB0UymbcxxFsZUyStbW98A6L-DbTUikDYwHXVNeG2oz7P_8/exec";

const tahunEl = document.getElementById("tahun");
const noInventoriEl = document.getElementById("noInventori");
const namaEl = document.getElementById("nama");
const kategoriEl = document.getElementById("kategori");
const jenamaEl = document.getElementById("jenama");
const modelEl = document.getElementById("model");
const noSiriEl = document.getElementById("noSiri");
const tagAsetEl = document.getElementById("tagAset");
const kuantitiEl = document.getElementById("kuantiti");
const lokasiEl = document.getElementById("lokasi");
const lokasiLainEl = document.getElementById("lokasiLain");
const statusEl = document.getElementById("status");
const tarikhEl = document.getElementById("tarikh");
const pembekalEl = document.getElementById("pembekal");
const gambarEl = document.getElementById("gambar");
const catatanEl = document.getElementById("catatan");
const imageInputEl = document.getElementById("imageInput");
const tableEl = document.getElementById("table");

for(let y=2010; y<=2035; y++){
  tahunEl.innerHTML += `<option ${y === new Date().getFullYear() ? "selected" : ""}>${y}</option>`;
}

function checkLokasi(){
  if(lokasiEl.value === "Lain-lain"){
    lokasiLainEl.style.display = "block";
    lokasiLainEl.focus();
  }else{
    lokasiLainEl.style.display = "none";
    lokasiLainEl.value = "";
  }
}

function load(){
  fetch(API)
  .then(r => r.json())
  .then(d => {
    tableEl.innerHTML = "";

    d.forEach(v => {
      tableEl.innerHTML += `
      <tr>
        <td>${v.noInventori || ""}</td>
        <td>${v.nama || ""}</td>
        <td>${v.kategori || ""}</td>
        <td>${v.jenama || ""}</td>
        <td>${v.lokasi || ""}</td>
        <td><button class="del" onclick="del(${v.row})">Delete</button></td>
      </tr>`;
    });
  });
}

function stats(){
  fetch(API + "?action=stats")
  .then(r => r.json())
  .then(s => {
    document.getElementById("total").innerText = s.total || 0;
    document.getElementById("baik").innerText = s.baik || 0;
    document.getElementById("rosak").innerText = s.rosak || 0;
    document.getElementById("pelupusan").innerText = s.pelupusan || 0;
    document.getElementById("ict").innerText = s.ICT || 0;
    document.getElementById("sewaan").innerText = s.Sewaan || 0;
    document.getElementById("pkpj").innerText = s.PKPJ || 0;
  });
}

function simpan(){

  let lokasiFinal = lokasiEl.value;

  if(lokasiEl.value === "Lain-lain"){
    if(lokasiLainEl.value.trim() === ""){
      alert("Sila masukkan lokasi lain-lain");
      lokasiLainEl.focus();
      return;
    }

    lokasiFinal = lokasiLainEl.value.trim();
  }

  const data = {
    action:"simpan",
    tahun:tahunEl.value,
    noInventori:noInventoriEl.value,
    nama:namaEl.value,
    kategori:kategoriEl.value,
    jenama:jenamaEl.value,
    model:modelEl.value,
    noSiri:noSiriEl.value,
    tagAset:tagAsetEl.value,
    kuantiti:kuantitiEl.value,
    lokasi:lokasiFinal,
    status:statusEl.value,
    tarikh:tarikhEl.value,
    pembekal:pembekalEl.value,
    gambar:gambarEl.value,
    catatan:catatanEl.value
  };

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify(data)
  })
  .then(r => r.json())
  .then(res => {
    alert(res.message || "OK");
    clearForm();
    load();
    stats();
  });
}

function uploadImage(){
  let file = imageInputEl.files[0];

  if(!file){
    alert("Pilih gambar");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    fetch(API,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({
        action:"upload",
        image:e.target.result.split(",")[1],
        mimeType:file.type,
        fileName:file.name
      })
    })
    .then(r => r.json())
    .then(res => {
      gambarEl.value = res.url;
      alert("UPLOAD OK. Link gambar sudah masuk dalam kotak Gambar URL.");
    });
  };

  reader.readAsDataURL(file);
}

function del(id){
  if(!confirm("Delete data ini?")) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"delete",
      row:id
    })
  })
  .then(() => {
    load();
    stats();
  });
}

function clearForm(){
  document.querySelectorAll("input, textarea").forEach(e => e.value = "");

  tahunEl.value = new Date().getFullYear();
  kategoriEl.value = "ICT";
  statusEl.value = "Baik";

  lokasiEl.selectedIndex = 0;
  lokasiLainEl.style.display = "none";
  lokasiLainEl.value = "";
}

window.onload = function(){
  load();
  stats();
};
</script>

</body>
</html>
