<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Inventori Perkakasan IT PKPJ</title>

<style>

/* ================= BACKGROUND ================= */
body{
  font-family: Arial;
  margin:0;
  padding:20px;
  background: linear-gradient(135deg, #e3f2fd, #f5f6fa);
  font-size:16px;
}

/* ================= TITLE ================= */
h2{
  text-align:center;
  font-size:30px;
  margin-bottom:10px;
}

/* ================= DASHBOARD ================= */
.dashboard{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  margin:20px 0;
}

.card{
  padding:15px;
  border-radius:12px;
  color:white;
  text-align:center;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.blue{background:#0d6efd}
.green{background:#198754}
.red{background:#dc3545}
.orange{background:#fd7e14}
.purple{background:#6f42c1}
.gray{background:#343a40}

/* ================= FORM ================= */
.form{
  display:grid;
  grid-template-columns:200px 1fr;
  gap:12px;
  max-width:950px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
  font-weight:bold;
}

input,select,textarea{
  padding:10px;
  font-size:15px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* ================= BUTTON ================= */
button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  font-size:15px;
}

.save{
  background:#0d6efd;
  margin-top:10px;
}

/* ================= TABLE ================= */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th,td{
  border:1px solid #eee;
  padding:10px;
  text-align:center;
}

th{
  background:#0d6efd;
  color:white;
}

.del{
  background:red;
  padding:5px 10px;
  font-size:13px;
}

.edit{
  background:orange;
  padding:5px 10px;
  font-size:13px;
}

</style>

</head>

<body>

<h2>📦 Sistem Inventori PKPJ PRO</h2>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard">

<div class="card blue">Total<br><span id="total">0</span></div>
<div class="card green">Baik<br><span id="baik">0</span></div>
<div class="card red">Rosak<br><span id="rosak">0</span></div>
<div class="card orange">Pelupusan<br><span id="pelupusan">0</span></div>
<div class="card purple">ICT<br><span id="ict">0</span></div>
<div class="card gray">Sewaan<br><span id="sewaan">0</span></div>

</div>

<!-- ================= FORM ================= -->
<div class="form">

<label>Tahun</label>
<select id="tahun"></select>

<label>No Inventori</label>
<input id="noInventori">

<label>Nama</label>
<input id="nama">

<label>Kategori</label>
<select id="kategori">
<option>ICT</option>
<option>Sewaan</option>
<option>PKPJ</option>
</select>

<label>Jenama</label>
<input id="jenama">

<label>Model</label>
<input id="model">

<label>No Siri</label>
<input id="noSiri">

<label>Tag Aset</label>
<input id="tagAset">

<label>Kuantiti</label>
<input id="kuantiti">

<label>Lokasi</label>
<input id="lokasi">

<label>Status</label>
<select id="status">
<option>Baik</option>
<option>Rosak</option>
<option>Pelupusan</option>
</select>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Pembekal</label>
<input id="pembekal">

<label>Gambar URL</label>
<input id="gambar">

<label>Catatan</label>
<textarea id="catatan"></textarea>

</div>

<button class="save" onclick="simpan()">SIMPAN DATA</button>

<!-- ================= TABLE ================= -->
<table>

<thead>
<tr>
<th>No Inventori</th>
<th>Nama</th>
<th>Kategori</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<!-- ================= SCRIPT ================= -->
<script>

const API = "PASTE_URL_HERE";

/* ===== YEAR ===== */
for(let y=2010;y<=2035;y++){
  tahun.innerHTML += `<option>${y}</option>`;
}

/* ===== LOAD ===== */
function load(){

fetch(API)
.then(r=>r.json())
.then(d=>{

table.innerHTML="";

d.forEach(v=>{

table.innerHTML += `
<tr>
<td>${v.noInventori}</td>
<td>${v.nama}</td>
<td>${v.kategori}</td>
<td>${v.status}</td>

<td>
<button class="edit" onclick="edit(${v.row})">Edit</button>
<button class="del" onclick="del(${v.row})">Delete</button>
</td>

</tr>
`;

});

});

}

/* ===== STATS ===== */
function stats(){

fetch(API+"?action=stats")
.then(r=>r.json())
.then(s=>{

total.innerText=s.total;
baik.innerText=s.baik;
rosak.innerText=s.rosak;
pelupusan.innerText=s.pelupusan;
ict.innerText=s.ICT;
sewaan.innerText=s.Sewaan;

});

}

/* ===== SIMPAN ===== */
function simpan(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"simpan",
tahun:tahun.value,
noInventori:noInventori.value,
nama:nama.value,
kategori:kategori.value,
jenama:jenama.value,
model:model.value,
noSiri:noSiri.value,
tagAset:tagAset.value,
kuantiti:kuantiti.value,
lokasi:lokasi.value,
status:status.value,
tarikh:tarikh.value,
pembekal:pembekal.value,
gambar:gambar.value,
catatan:catatan.value
})
})
.then(r=>r.json())
.then(()=>{

alert("BERJAYA DISIMPAN ✔");

clearForm();
load();
stats();

});

}

/* ===== DELETE ===== */
function del(id){

if(!confirm("Delete data ini?")) return;

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"delete",
rowNumber:id
})
})
.then(()=>{

load();
stats();

});

}

/* ===== CLEAR ===== */
function clearForm(){

document.querySelectorAll("input,textarea").forEach(e=>{
e.value="";
});

}

/* ===== INIT ===== */
window.onload=function(){
load();
stats();
}

</script>

</body>
</html>
