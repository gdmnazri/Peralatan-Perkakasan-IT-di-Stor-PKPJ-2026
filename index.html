<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Inventori PKPJ</title>

<style>

body{
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}

h2{
  text-align:center;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  margin:20px 0;
}

.card{
  padding:15px;
  border-radius:10px;
  color:white;
  text-align:center;
  font-weight:bold;
}

.blue{background:#0d6efd}
.green{background:#198754}
.red{background:#dc3545}
.orange{background:#fd7e14}
.purple{background:#6f42c1}
.gray{background:#343a40}

/* FORM - LEFT RIGHT BALANCE */
.form{
  display:grid;
  grid-template-columns:180px 1fr 180px 1fr;
  gap:10px;
  max-width:1100px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

/* CATATAN FULL ROW CENTER */
.full-row{
  grid-column: 1 / span 4;
}

/* INPUT STYLE */
input,select,textarea{
  padding:10px;
  width:100%;
  box-sizing:border-box;
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

.save{background:#0d6efd}
.upload{background:#198754}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

th{
  background:#0d6efd;
  color:white;
}

.del{
  background:red;
  padding:5px 10px;
}

</style>

</head>

<body>

<h2>SISTEM INVENTORI PKPJ</h2>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="card blue">Total <span id="total">0</span></div>
<div class="card green">Baik <span id="baik">0</span></div>
<div class="card red">Rosak <span id="rosak">0</span></div>
<div class="card orange">Pelupusan <span id="pelupusan">0</span></div>
<div class="card purple">ICT <span id="ict">0</span></div>
<div class="card gray">Sewaan <span id="sewaan">0</span></div>
</div>

<!-- FORM -->
<div class="form">

<label>Tahun</label>
<select id="tahun"></select>

<label>No Inventori</label>
<input id="noInventori">

<label>Nama</label>
<input id="nama">

<label>Kategori</label>
<select id="kategori">
<option>ICT</option>
<option>Sewaan</option>
<option>PKPJ</option>
</select>

<label>Jenama</label>
<input id="jenama">

<label>Model</label>
<input id="model">

<label>No Siri</label>
<input id="noSiri">

<label>Tag Aset</label>
<input id="tagAset">

<label>Kuantiti</label>
<input id="kuantiti">

<label>Lokasi</label>
<input id="lokasi">

<label>Status</label>
<select id="status">
<option>Baik</option>
<option>Rosak</option>
<option>Pelupusan</option>
</select>

<label>Tarikh</label>
<input type="date" id="tarikh">

<label>Pembekal</label>
<input id="pembekal">

<!-- GAMBAR -->
<label>Gambar URL</label>
<input id="gambar" readonly>

<label>Upload Gambar</label>
<input type="file" id="imageInput">

<button type="button" class="upload" onclick="uploadImage()">
UPLOAD GAMBAR
</button>

<!-- CATATAN FULL CENTER -->
<div class="full-row">
<label>Catatan</label>
<textarea id="catatan"></textarea>
</div>

</div>

<button class="save" onclick="simpan()">SIMPAN DATA</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>No Inventori</th>
<th>Nama</th>
<th>Kategori</th>
<th>Jenama</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbwVrSxZMipC72LokF6ojNd08bTlX5zTHxnjKUKNChZBE8nC5FaQooJR6D9DtgZCSiP2/exec";

/* YEAR */
for(let y=2010;y<=2035;y++){
  tahun.innerHTML += `<option>${y}</option>`;
}

/* LOAD */
function load(){

fetch(API)
.then(r=>r.json())
.then(d=>{

table.innerHTML="";

d.forEach(v=>{

table.innerHTML += `
<tr>
<td>${v.noInventori||""}</td>
<td>${v.nama||""}</td>
<td>${v.kategori||""}</td>
<td>${v.jenama||""}</td>
<td>${v.status||""}</td>
<td><button class="del" onclick="del(${v.row})">Delete</button></td>
</tr>
`;

});

});

}

/* STATS */
function stats(){

fetch(API+"?action=stats")
.then(r=>r.json())
.then(s=>{

total.innerText=s.total||0;
baik.innerText=s.baik||0;
rosak.innerText=s.rosak||0;
pelupusan.innerText=s.pelupusan||0;
ict.innerText=s.ICT||0;
sewaan.innerText=s.Sewaan||0;

});

}

/* SIMPAN */
function simpan(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"simpan",
tahun:tahun.value,
noInventori:noInventori.value,
nama:nama.value,
kategori:kategori.value,
jenama:jenama.value,
model:model.value,
noSiri:noSiri.value,
tagAset:tagAset.value,
kuantiti:kuantiti.value,
lokasi:lokasi.value,
status:status.value,
tarikh:tarikh.value,
pembekal:pembekal.value,
gambar:gambar.value,
catatan:catatan.value
})
})
.then(r=>r.json())
.then(res=>{

alert(res.message || "BERJAYA DISIMPAN ✔");

clearForm();
load();
stats();

});

}

/* UPLOAD GAMBAR */
function uploadImage(){

let file=document.getElementById("imageInput").files[0];

if(!file){
alert("Pilih gambar dulu");
return;
}

let reader=new FileReader();

reader.onload=function(e){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"upload",
image:e.target.result.split(",")[1],
mimeType:file.type,
fileName:file.name
})
})
.then(r=>r.json())
.then(res=>{

gambar.value=res.url;
alert("UPLOAD BERJAYA ✔");

});

};

reader.readAsDataURL(file);

}

/* DELETE */
function del(id){

if(!confirm("Delete?")) return;

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"delete",
row:id
})
})
.then(()=>{load();stats();});

}

/* CLEAR */
function clearForm(){

document.querySelectorAll("input,textarea").forEach(e=>{
e.value="";
});

}

/* INIT */
window.onload=function(){
load();
stats();
}

</script>

</body>
</html>
