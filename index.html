<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventori PKPJ</title>

<style>

body{font-family:Arial;background:#f4f6f8;padding:20px}

.header{text-align:center}

.form{
  max-width:900px;
  margin:auto;
  display:grid;
  grid-template-columns:180px 1fr;
  gap:10px;
}

input,select,textarea{
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  color:white;
  cursor:pointer;
}

.save{background:#0d6efd}
.upload{background:#198754}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
}

th{background:#0d6efd;color:white}

.card{
  display:flex;
  gap:10px;
  margin:20px 0;
}

.box{
  flex:1;
  padding:10px;
  color:white;
  text-align:center;
  border-radius:6px;
}

.blue{background:#0d6efd}
.green{background:#198754}
.red{background:#dc3545}

</style>

</head>

<body>

<h2 class="header">Sistem Inventori PKPJ</h2>

<!-- DASHBOARD -->
<div class="card">
  <div class="box blue">Total<br><span id="total">0</span></div>
  <div class="box green">Baik<br><span id="baik">0</span></div>
  <div class="box red">Rosak<br><span id="rosak">0</span></div>
</div>

<!-- FORM -->
<div class="form">

<label>Tahun</label><input id="tahun">

<label>No Inventori</label><input id="noInventori">

<label>Nama</label><input id="nama">

<label>Kategori</label>
<select id="kategori">
  <option>ICT</option>
  <option>Sewaan</option>
  <option>PKPJ</option>
  <option>Lain-lain</option>
</select>

<label>Jenama</label><input id="jenama">

<label>Model</label><input id="model">

<label>No Siri</label><input id="noSiri">

<label>Status</label>
<select id="status">
  <option>Baik</option>
  <option>Rosak</option>
</select>

<label>Gambar</label><input id="gambar">

<label>Upload</label><input type="file" id="file">

<label>Catatan</label><textarea id="catatan"></textarea>

</div>

<button class="save" onclick="simpan()">Simpan</button>
<button class="upload" onclick="upload()">Upload</button>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Kategori</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const API = "PASTE_URL_HERE";

let cache=[];

// LOAD
function load(){

fetch(API)
.then(r=>r.json())
.then(d=>{

cache=d;

let t=document.getElementById("table");
t.innerHTML="";

d.forEach((v,i)=>{

t.innerHTML += `
<tr>
<td>${v[2]}</td>
<td>${v[3]}</td>
<td>${v[4]}</td>
<td>${v[11]}</td>
</tr>`;

});

});

}

// STATS
function stats(){

fetch(API+"?action=stats")
.then(r=>r.json())
.then(s=>{

total.innerText=s.total;
baik.innerText=s.baik;
rosak.innerText=s.rosak;

});

}

// SIMPAN
function simpan(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"simpan",
tahun:tahun.value,
noInventori:noInventori.value,
nama:nama.value,
kategori:kategori.value,
jenama:jenama.value,
model:model.value,
noSiri:noSiri.value,
status:status.value,
gambar:gambar.value,
catatan:catatan.value
})
})
.then(r=>r.json())
.then(()=>{

alert("BERJAYA DISIMPAN");
clear();
load();
stats();

});

}

// RESET
function clear(){

document.querySelectorAll("input,textarea").forEach(e=>e.value="");

}

// UPLOAD
function upload(){

let file=document.getElementById("file").files[0];
let reader=new FileReader();

reader.onload=function(e){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"upload",
image:e.target.result.split(",")[1],
mimeType:file.type,
fileName:file.name
})
})
.then(r=>r.json())
.then(res=>{
gambar.value=res.url;
});

};

reader.readAsDataURL(file);

}

// INIT
window.onload=function(){
load();
stats();
}

</script>

</body>
</html>
